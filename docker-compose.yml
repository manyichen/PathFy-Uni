# PathFy-Uni 全栈 Docker Compose
# 启动: docker compose up -d
# 首次: docker compose up -d --build (需要构建前端)
# 参考: deploy/DEPLOY.md

services:
  # ============================================================
  # MySQL 8 — 用户、简历、匹配快照、生涯报告
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: pathfy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-suilli_mizi}
      MYSQL_USER: ${MYSQL_USER:-suilli_mizi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Neo4j 5 — 岗位图谱
  # ============================================================
  neo4j:
    image: neo4j:5
    container_name: pathfy-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:?set NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================
  # Flask 后端
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pathfy-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      TOKEN_EXPIRES_HOURS: "24"

      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-suilli_mizi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-suilli_mizi}

      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_DATABASE: neo4j

      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}

      # LLM API Key（按需填写，不填不影响非 AI 功能）
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      ARK_MODEL: ${ARK_MODEL:-doubao-seed-2-0-mini-260215}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}

      # OCR
      OCR_APP_ID: ${OCR_APP_ID:-}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_SECRET_KEY: ${OCR_SECRET_KEY:-}

      # Graph ETL
      GRAPH_LLM_BASE_URL: ${GRAPH_LLM_BASE_URL:-}
      GRAPH_LLM_API_KEY: ${GRAPH_LLM_API_KEY:-}
      GRAPH_LLM_MODEL: ${GRAPH_LLM_MODEL:-doubao-seed-2-0-mini-260215}

      # 隐私
      LLM_PRIVACY_MODE: "true"
      DELETE_UPLOADED_RESUME_AFTER_OCR: "true"
      API_CACHE_NO_STORE: "true"

      MAX_UPLOAD_MB: "10"
      RESUME_UPLOAD_DIR: /var/private/pathfy/resumes

      MATCH_PREVIEW_MAX_SCAN: "2000"
      MATCH_TOP_K_RETURN: "30"
      MATCH_LLM_TIMEOUT_SECONDS: "120"
      CAREER_LLM_TIMEOUT_SECONDS: "120"
      GRAPH_LLM_TIMEOUT_SECONDS: "120"

    volumes:
      - resume_uploads:/var/private/pathfy/resumes
      - promotion_backups:/app/promotion_backups
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================================
  # Nginx — 前端静态文件 + /api 反代
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pathfy-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  resume_uploads:
  promotion_backups:
