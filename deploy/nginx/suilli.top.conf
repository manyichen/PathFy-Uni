# 宝塔添加站点 suilli.top 后，可将本文件内容合并进站点配置，或替换 Nginx 站点 conf。
# 站点根目录: /www/wwwroot/pathfy-uni/frontend/dist
#
# SSL 证书路径为宝塔默认位置；若在面板里申请 Let's Encrypt，路径一般会自动一致。
# 申请证书前可先用仅 listen 80 的 server 块，证书就绪后再启用 443 块。

# HTTP → HTTPS（含 www 统一到主域名）
server {
    listen 80;
    listen [::]:80;
    server_name suilli.top www.suilli.top;
    return 301 https://suilli.top$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.suilli.top;

    ssl_certificate    /www/server/panel/vhost/cert/suilli.top/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/suilli.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://suilli.top$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name suilli.top;

    ssl_certificate    /www/server/panel/vhost/cert/suilli.top/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/suilli.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /www/wwwroot/pathfy-uni/frontend/dist;
    index index.html;

    access_log /www/wwwlogs/suilli.top.log;
    error_log  /www/wwwlogs/suilli.top.error.log;

    client_max_body_size 10m;

    # Flask API（Gunicorn 监听 127.0.0.1:5000）
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Astro 静态站点 + 前端路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
